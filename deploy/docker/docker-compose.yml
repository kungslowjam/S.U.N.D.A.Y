services:
  sunday:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SUNDAY_HOST=0.0.0.0
      - SUNDAY_PORT=8000
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - sunday-config:/app/configs/sunday
      - sunday-models:/app/llama-cpp/models
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  ollama-models:
  sunday-config:
  sunday-models:
