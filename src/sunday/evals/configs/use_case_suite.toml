# Use-Case Benchmark Suite
# Evaluates SUNDAY on 5 practical use cases:
# email triage, morning briefs, research, knowledge base QA, coding tasks.

[meta]
name = "use-case-suite"
description = "Top 5 use-case benchmarks for SUNDAY product demo"

[defaults]
temperature = 0.0
max_tokens = 2048

[judge]
model = "gpt-5-mini-2025-08-07"

[run]
max_workers = 4
output_dir = "results/use-cases/"
seed = 42

[[models]]
name = "qwen3:8b"
engine = "ollama"

[[benchmarks]]
name = "email_triage"
backend = "sunday-direct"
max_samples = 30

[[benchmarks]]
name = "morning_brief"
backend = "sunday-direct"
max_samples = 15

[[benchmarks]]
name = "research_mining"
backend = "sunday-direct"
max_samples = 30

[[benchmarks]]
name = "knowledge_base"
backend = "sunday-direct"
max_samples = 30

[[benchmarks]]
name = "coding_task"
backend = "sunday-direct"
max_samples = 30
