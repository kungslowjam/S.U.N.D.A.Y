# ═══════════════════════════════════════════════════════════════
# SUNDAY CONFIGURATION
# ═══════════════════════════════════════════════════════════════

[intelligence]
default_model = "Qwen3.5-9B-DeepSeek-V4-Flash-Q4_K_S.gguf"
fallback_model = "Qwen3.5-9B-DeepSeek-V4-Flash-Q4_K_S.gguf"
preferred_engine = "llamacpp"
provider = "local" # options: local, openrouter, hybrid, openai, anthropic, google

[intelligence.openrouter]
api_key = "" # SET THIS IN YOUR ENVIRONMENT: $env:OPENROUTER_API_KEY="..."
base_url = "https://openrouter.ai/api/v1"
model = "google/gemini-2.5-flash:free"

# Generation defaults
temperature = 0.1
max_tokens = 4096
top_p = 0.9
top_k = 40
repetition_penalty = 1.2

# ═══════════════════════════════════════════════════════════════
# PILLAR 2: Agent — The Agentic Harness
# ═══════════════════════════════════════════════════════════════
[agent]
default_agent = "orchestrator"
mode = "function_calling"
max_turns = 15
max_tokens = 4096
tools = "code_interpreter,openalex_search,web_search,file_read,file_write,shell_exec,skill_manage,delegate_browser,delegate_research,browser_navigate,browser_click,browser_type,browser_screenshot,browser_extract,browser_get_elements,browser_drag,browser_scroll,browser_get_accessibility_tree,browser_reset,browser_use_task,git,calculator,think"
objective = """1. AUTONOMOUS FIRST: You are a proactive assistant. Never tell the user how to do something manually if you have a tool to do it yourself. Always use the browser or web search to find real-time data instead of relying on your training data or general knowledge.
2. VISUAL VERIFICATION: After any critical data extraction or navigation, use browser_screenshot. If you have vision capabilities, analyze the image to verify that the extracted text matches what is visually displayed. This prevents hallucinations.
3. EFFICIENCY: For browser tasks, navigate to the target page, extract data ONCE with browser_extract, then immediately summarize and respond. Do NOT call browser_extract or browser_get_elements on the same page more than once.
4. WHEN YOU HAVE DATA, STOP: If browser_extract returns hotel names, prices, or any requested data, your job is to parse that text, summarize it, and present it to the user. Do NOT continue browsing.
5. URL FIRST: Before interacting with a site's homepage or filling forms, use your knowledge to construct a direct search URL (with filters) to jump straight to the results. If you don't know the URL structure, you may use a search engine to find it first.
6. EXECUTION PLAN: In your THOUGHT, always maintain a list of tasks using [ ] for upcoming and [x] for completed steps. This provides a visual timeline for the user.
7. SEMANTIC BROWSING: Prioritize using browser_get_accessibility_tree or browser_get_elements. These tools provide a "Semantic Layer" (Roles, Labels) which is much more robust than raw HTML. Focus on finding elements by their semantic meaning (e.g., "Submit button", "Check-in date input").
8. FALLBACK: If browser_use_task fails, use the semantic tools as a fallback. If that also fails, use web_search.
9. HONESTY: Only report data you actually extracted. Never fabricate results.
10. CLARIFY: If critical information is missing (e.g., specific dates for hotel booking, precise location), ask the user for clarification instead of guessing or aimless browsing.
11. NO WANDERING: If a site seems too complex or has too many popups, immediately try constructing a direct search URL (see Rule 3)."""
context_from_memory = true

# ═══════════════════════════════════════════════════════════════
# PILLAR 3: Tools — Storage & MCP
# ═══════════════════════════════════════════════════════════════
[tools.storage]
default_backend = "sqlite"
db_path = "~/.sunday/memory.db"

[tools.mcp]
enabled = true

# ═══════════════════════════════════════════════════════════════
# PILLAR 4: Engine — The Inference Runtime
# ═══════════════════════════════════════════════════════════════
[engine]
default = "llamacpp"

[engine.vllm]
host = "http://localhost:8001"

[engine.ollama]
host = "http://127.0.0.1:11434"

[engine.llamacpp]
host = "http://127.0.0.1:8081"
models_dir = "c:/Users/hello/Desktop/Project_me/SUNDAY/llama-cpp/models"

# ═══════════════════════════════════════════════════════════════
# PILLAR 5: Learning & Skills
# ═══════════════════════════════════════════════════════════════
[learning]
enabled = false

[traces]
enabled = true
db_path = "~/.sunday/traces.db"

[skills]
enabled = true
skills_dir = "~/.sunday/skills/"
auto_discover = true

[[skills.sources]]
source = "hermes"
url = "https://github.com/NousResearch/hermes-agent.git"
auto_update = true

[[skills.sources]]
source = "officialskills"
url = "https://github.com/VoltAgent/awesome-agent-skills.git"

# ═══════════════════════════════════════════════════════════════
# PILLAR 6: Server & Interface
# ═══════════════════════════════════════════════════════════════
[server]
host = "127.0.0.1"
port = 8000
agent = "native_openhands"

[voice_live]
enabled = true
host = "127.0.0.1"
port = 8098
agent_endpoint = "http://127.0.0.1:8000/v1/voice/turn"
fast_fallback_endpoint = "http://127.0.0.1:8082/v1/chat/completions"
stt_model = "pariya47/distill-whisper-th-large-v3-ct2"
stt_language = "th"
