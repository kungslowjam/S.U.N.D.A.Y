# ═══════════════════════════════════════════════════════════════
# SUNDAY CONFIGURATION
# ═══════════════════════════════════════════════════════════════

[intelligence]
default_model = "gemma-4-E4B-it-ultra-uncensored-heretic-Q4_K_M.gguf"
fallback_model = "gemma-4-E4B-it-ultra-uncensored-heretic-Q4_K_M.gguf"
preferred_engine = "llamacpp"
provider = "local"

# Generation defaults
temperature = 0.1
max_tokens = 4096
top_p = 0.9
top_k = 40
repetition_penalty = 1.2

# ═══════════════════════════════════════════════════════════════
# PILLAR 2: Agent — The Agentic Harness
# ═══════════════════════════════════════════════════════════════
[agent]
default_agent = "orchestrator"
mode = "structured"
max_turns = 15
max_tokens = 4096
tools = "code_interpreter,openalex_search,web_search,file_read,file_write,shell,skills,browser_navigate,browser_click,browser_type,browser_screenshot,browser_extract,browser_get_elements,browser_drag,browser_scroll,browser_get_accessibility_tree,browser_reset,browser_use_task,git,calculator,think"
objective = """You are SUNDAY, an autonomous AI assistant. Follow these rules strictly:
1. EFFICIENCY: For browser tasks, navigate to the target page, extract data ONCE with browser_extract, then immediately summarize and respond. Do NOT call browser_extract or browser_get_elements on the same page more than once.
2. WHEN YOU HAVE DATA, STOP: If browser_extract returns hotel names, prices, or any requested data, your job is to parse that text, summarize it, and present it to the user. Do NOT continue browsing.
3. URL FIRST: Try constructing a direct URL with filters before filling forms manually (e.g., add ?ss=query&nflt=review_score%3D90 to booking sites).
4. FALLBACK: If browser_use_task fails, use browser_navigate + browser_extract as a 2-step fallback. If that also fails, use web_search.
5. HONESTY: Only report data you actually extracted. Never fabricate results.
6. CLARIFY: If critical information is missing (e.g., specific dates for hotel booking, precise location), ask the user for clarification instead of guessing or aimless browsing."""
context_from_memory = true

# ═══════════════════════════════════════════════════════════════
# PILLAR 3: Tools — Storage & MCP
# ═══════════════════════════════════════════════════════════════
[tools.storage]
default_backend = "sqlite"
db_path = "~/.sunday/memory.db"

[tools.mcp]
enabled = true

# ═══════════════════════════════════════════════════════════════
# PILLAR 4: Engine — The Inference Runtime
# ═══════════════════════════════════════════════════════════════
[engine]
default = "llamacpp"

[engine.vllm]
host = "http://localhost:8001"

[engine.ollama]
host = "http://localhost:11434"

[engine.llamacpp]
host = "http://localhost:8081"
models_dir = "c:/Users/hello/Desktop/Project_me/SUNDAY/llama-cpp/models"

# ═══════════════════════════════════════════════════════════════
# PILLAR 5: Learning & Skills
# ═══════════════════════════════════════════════════════════════
[learning]
enabled = false

[traces]
enabled = true
db_path = "~/.sunday/traces.db"

[skills]
enabled = true
skills_dir = "~/.sunday/skills/"
auto_discover = true

[[skills.sources]]
source = "hermes"
url = "https://github.com/NousResearch/hermes-agent.git"
auto_update = true

[[skills.sources]]
source = "officialskills"
url = "https://github.com/VoltAgent/awesome-agent-skills.git"

# ═══════════════════════════════════════════════════════════════
# PILLAR 6: Server & Interface
# ═══════════════════════════════════════════════════════════════
[server]
host = "0.0.0.0"
port = 8000
agent = "native_openhands"

[voice_live]
enabled = true
host = "127.0.0.1"
port = 8098
agent_endpoint = "http://127.0.0.1:8000/v1/voice/turn"
fast_fallback_endpoint = "http://127.0.0.1:8082/v1/chat/completions"
stt_model = "pariya47/distill-whisper-th-large-v3-ct2"
stt_language = "th"
