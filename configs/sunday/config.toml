# ═══════════════════════════════════════════════════════════════
# SUNDAY CONFIGURATION
# ═══════════════════════════════════════════════════════════════

[intelligence]
default_model = "gemma-4-E4B-it-ultra-uncensored-heretic-Q4_K_M.gguf"
fallback_model = "gemma-4-E4B-it-ultra-uncensored-heretic-Q4_K_M.gguf"
preferred_engine = "llamacpp"
provider = "local"

# Generation defaults
temperature = 0.1
max_tokens = 4096
top_p = 0.9
top_k = 40
repetition_penalty = 1.1

# ═══════════════════════════════════════════════════════════════
# PILLAR 2: Agent — The Agentic Harness
# ═══════════════════════════════════════════════════════════════
[agent]
default_agent = "orchestrator"
mode = "structured"
max_turns = 40
max_tokens = 4096
tools = "code_interpreter,openalex_search,web_search,file_read,file_write,shell,skills,browser_navigate,browser_click,browser_type,browser_screenshot,browser_extract,browser_get_elements,browser_drag,browser_scroll,browser_get_accessibility_tree,browser_reset,browser_use_task,git,calculator,think"
objective = """You are SUNDAY, an autonomous AI assistant. Use these generalized browser strategies for efficiency:
1. URL OPTIMIZATION: Always try to identify the platform's URL pattern for filtering. If you can add query parameters (e.g., ?q=product&sort=price) directly, do so to skip manual steps.
2. SEMANTIC SEARCH: Prioritize interacting with 'input' fields and 'submit' buttons first. Use 'browser_get_elements' to find the primary search bar of any site.
3. PREFER AUTONOMOUS: For any multi-step task requiring logic (e.g., "find the cheapest 9+ rated hotel"), use 'browser_use_task' as your primary engine. Manual steps should only be used for simple one-click tasks.
4. RECOVERY: If a selector fails, try finding the element by its label/text. If that fails, assume the site has changed and try a web search to find a deep link to the target page.
5. NO HALLUCINATION: Never report data you haven't explicitly extracted from the browser or a search result. If a page is empty or blocked, state it clearly."""
context_from_memory = true

# ═══════════════════════════════════════════════════════════════
# PILLAR 3: Tools — Storage & MCP
# ═══════════════════════════════════════════════════════════════
[tools.storage]
default_backend = "sqlite"
db_path = "~/.sunday/memory.db"

[tools.mcp]
enabled = true

# ═══════════════════════════════════════════════════════════════
# PILLAR 4: Engine — The Inference Runtime
# ═══════════════════════════════════════════════════════════════
[engine]
default = "llamacpp"

[engine.vllm]
host = "http://localhost:8001"

[engine.ollama]
host = "http://localhost:11434"

[engine.llamacpp]
host = "http://localhost:8081"
models_dir = "c:/Users/hello/Desktop/Project_me/SUNDAY/llama-cpp/models"

# ═══════════════════════════════════════════════════════════════
# PILLAR 5: Learning & Skills
# ═══════════════════════════════════════════════════════════════
[learning]
enabled = false

[traces]
enabled = true
db_path = "~/.sunday/traces.db"

[skills]
enabled = true
skills_dir = "~/.sunday/skills/"
auto_discover = true

[[skills.sources]]
source = "hermes"
url = "https://github.com/NousResearch/hermes-agent.git"
auto_update = true

[[skills.sources]]
source = "officialskills"
url = "https://github.com/VoltAgent/awesome-agent-skills.git"

# ═══════════════════════════════════════════════════════════════
# PILLAR 6: Server & Interface
# ═══════════════════════════════════════════════════════════════
[server]
host = "0.0.0.0"
port = 8000
agent = "native_openhands"

[voice_live]
enabled = true
host = "127.0.0.1"
port = 8098
agent_endpoint = "http://127.0.0.1:8000/v1/voice/turn"
fast_fallback_endpoint = "http://127.0.0.1:8082/v1/chat/completions"
stt_model = "pariya47/distill-whisper-th-large-v3-ct2"
stt_language = "th"
