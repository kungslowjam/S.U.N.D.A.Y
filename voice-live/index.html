<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SUNDAY Voice Live</title>
  <link rel="stylesheet" href="./style.css?v=minimal-v1">
</head>

<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-copy">
        <span class="eyebrow">Voice Live</span>
        <h1>SUNDAY</h1>
        <p class="subline">Realtime bilingual command channel</p>
        <div class="status-chip">
          <span class="status-dot"></span>
          <span id="status">Idle</span>
        </div>
      </div>
      <div class="reactor" aria-hidden="true">
        <div class="ring ring-one"></div>
        <div class="ring ring-two"></div>
        <div class="core"></div>
        <div class="scanline"></div>
      </div>
      <div class="signal-panel">
        <span>MIC SIGNAL</span>
        <div class="meter" aria-hidden="true"><span id="meterFill"></span></div>
      </div>
    </section>

    <section class="controls">
      <div class="command-strip">
        <div class="route-mode" role="group" aria-label="Voice route mode">
          <button id="liveModeBtn" class="mode-tab active" type="button">Live Chat</button>
          <button id="agentModeBtn" class="mode-tab" type="button">Agent Command</button>
        </div>
        <p id="routeHint" class="route-hint">Fast voice model. Tools stay idle unless you switch modes.</p>
        <button id="toggleBtn" type="button">Start live</button>
        <button id="talkBtn" type="button" disabled>Hold to talk</button>
        <button id="interruptBtn" type="button" disabled>Interrupt</button>
      </div>
      <div class="control-grid">
        <label>
          Mode
          <select id="modeInput">
              <option value="balanced">Balanced</option>
              <option value="quick" selected>Quick</option>
          </select>
        </label>
        <label>
          STT
          <select id="sttInput">
            <option value="browser">Browser</option>
            <option value="local" selected>Local Auto</option>
            <option value="push">Push-to-talk</option>
          </select>
        </label>
        <label>
          STT Model
          <select id="sttModelInput">
            <option value="tiny">Tiny Multi</option>
            <option value="base" selected>Base Multi</option>
            <option value="small">Small Multi</option>
            <option value="pariya47/distill-whisper-th-large-v3-ct2">Thai Distill CT2</option>
            <option value="Vinxscribe/biodatlab-whisper-th-medium-faster">Thai Medium CT2</option>
            <option value="tiny.en">Tiny EN</option>
            <option value="base.en">Base EN</option>
          </select>
        </label>
        <label>
          STT Lang
          <select id="sttLangInput">
            <option value="auto" selected>Auto</option>
            <option value="th">Thai</option>
            <option value="en">English</option>
          </select>
        </label>
        <label class="wide">
          Voice LLM
          <input id="endpointInput" value="http://127.0.0.1:8082/v1/chat/completions">
        </label>
        <label class="wide">
          Agent / Tools
          <input id="fallbackEndpointInput" value="http://127.0.0.1:8000/v1/voice/turn">
        </label>
        <label>
          Model
          <input id="modelInput" value="local-model">
        </label>
        <label>
          Voice
          <select id="voiceInput">
            <option value="auto" selected>Auto TH/EN</option>
            <option value="en-US-AvaNeural">Ava</option>
            <option value="en-US-AriaNeural">Aria</option>
            <option value="en-US-GuyNeural">Guy</option>
            <option value="en-GB-SoniaNeural">Sonia</option>
            <option value="th-TH-PremwadeeNeural">Premwadee TH</option>
          </select>
        </label>
      </div>
    </section>

    <section class="stats">
      <span id="latencyText">Latency: -</span>
      <span id="turnText">Turns: 0</span>
      <span>Tip: speak in short sentences; interrupt by talking or pressing Interrupt.</span>
    </section>

    <section class="conversation" id="conversation" aria-live="polite"></section>
  </main>
  <script src="./app.js?v=fast-voice-v4"></script>
</body>

</html>
