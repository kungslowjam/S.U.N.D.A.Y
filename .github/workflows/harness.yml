name: Harness QA

on:
  push:
    branches: [main]
    paths:
      - 'src/sunday/harness/**'
      - 'src/sunday/tools/harness_tool.py'
      - 'src/sunday/tools/**'
      - 'tests/agents/**'
      - '.github/workflows/harness.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/sunday/harness/**'
      - 'src/sunday/tools/harness_tool.py'
      - 'src/sunday/tools/**'
      - 'tests/agents/**'
      - '.github/workflows/harness.yml'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode'
        required: true
        default: 'parallel'
        type: choice
        options:
          - parallel
          - sequential
      max_workers:
        description: 'Max parallel workers'
        required: false
        default: '4'
        type: string

concurrency:
  group: harness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness-unit:
    name: Harness Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Test Harness Components
        run: |
          uv run python -c "
          import sys
          sys.path.insert(0, 'src')
          from sunday.harness.runner import (
              SkillHarness, HarnessConfig, Assertion, AssertionType,
              AssertionEngine, VisualRegressionChecker, PerformanceTracker
          )
          from sunday.harness.harness_boot import CrossPlatformProcessManager
          from sunday.tools.harness_tool import (
              RunHarnessTestTool, E2EBrowserTestTool,
              AutoSelfTestTool, HarnessBatchTestTool
          )
          print('✅ All harness imports successful')
          
          # Test assertion engine
          engine = AssertionEngine()
          from sunday.harness.runner import TestResult
          result = TestResult('test', 'prompt', True, 'output contains success', latency=1.0)
          assertions = [
              Assertion(AssertionType.TEXT_CONTAINS, 'success'),
              Assertion(AssertionType.LATENCY_THRESHOLD, 5.0),
          ]
          ars = engine.evaluate(result, assertions)
          assert all(ar.passed for ar in ars), 'Assertions should pass'
          print('✅ Assertion engine works')
          
          # Test performance tracker
          pt = PerformanceTracker()
          check = pt.check_regression('test_tool', 2.0)
          assert 'has_baseline' in check
          print('✅ Performance tracker works')
          
          # Test visual regression checker
          vc = VisualRegressionChecker()
          assert os.path.isdir(vc.baseline_dir)
          print('✅ Visual regression checker works')
          
          # Test cross-platform process manager
          pm = CrossPlatformProcessManager()
          assert pm.system in ['windows', 'linux', 'darwin']
          print(f'✅ Cross-platform process manager works (platform: {pm.system})')
          
          print()
          print('All harness unit tests passed!')
          "

  harness-batch:
    name: Harness Batch Test
    runs-on: ubuntu-latest
    needs: harness-unit
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run Batch Harness Test
        run: |
          MODE="${{ github.event.inputs.test_mode || 'parallel' }}"
          WORKERS="${{ github.event.inputs.max_workers || '4' }}"
          
          if [ "$MODE" = "sequential" ]; then
            uv run python src/sunday/harness/test_all.py --sequential
          else
            uv run python src/sunday/harness/test_all.py --workers "$WORKERS"
          fi
        continue-on-error: true

      - name: Upload Harness Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-stress-test
          path: |
            harness-stress-test/*.png
            harness-stress-test/performance_baseline.json
            harness-stress-test/traces/*.json
          if-no-files-found: ignore

  harness-report:
    name: Generate Harness Report
    runs-on: ubuntu-latest
    needs: [harness-unit, harness-batch]
    if: always()
    steps:
      - uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: harness-stress-test
          path: harness-stress-test/
        continue-on-error: true

      - name: Generate Report
        run: |
          echo "## Harness QA Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.harness-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Batch Test | ${{ needs.harness-batch.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -d harness-stress-test ]; then
            echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
            echo "- Screenshots: $(find harness-stress-test -name '*.png' | wc -l)" >> $GITHUB_STEP_SUMMARY
            echo "- Traces: $(find harness-stress-test/traces -name '*.json' 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          fi
